<!DOCTYPE html>
<html>

<head>
    <title>Connect server mqtt</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://unpkg.com/tachyons@4.12.0/css/tachyons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <meta charset="utf-8" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js" type="text/javascript"></script>
    <script type="text/javascript" language="javascript">
    </script>
    <style>
        html {
            height: 100vh;
            width: 100vw;
            font-family: "Open Sans", sans-serif;
        }
        
        .b {
            width: 100px;
            height: 40px;
            font-size: 21px;
            color: #fff;
            background-color: darkblue;
            border-radius: 10px;
        }
        
        .t {
            width: 100px;
            height: 40px;
            font-size: 21px;
            color: #fff;
            background-color: #f44336;
            border-radius: 10px;
        }
        
        .shadow-3 {
            box-shadow: 0px 0px 12px #ddd;
        }
        /* The switch - the box around the slider */
        
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        /* Hide default HTML checkbox */
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        /* The slider */
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            -webkit-transition: 0.4s;
            transition: 0.4s;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            -webkit-transition: 0.4s;
            transition: 0.4s;
        }
        
        input:checked+.slider {
            background-color: #2196f3;
        }
        
        input:focus+.slider {
            box-shadow: 0 0 1px #2196f3;
        }
        
        input:checked+.slider:before {
            -webkit-transform: translateX(26px);
            -ms-transform: translateX(26px);
            transform: translateX(26px);
        }
        /* Rounded sliders */
        
        .slider.round {
            border-radius: 34px;
        }
        
        .slider.round:before {
            border-radius: 50%;
        }
    </style>
</head>
<script>
    function login(e) {
        fetch('https://550studios.com:61111/temp_humi/get', {
          method: 'get',
          mode: 'cors',
          headers: {
            'Content-Type': 'application/json'
          }
        }).then(response => response.json())
          .then(data => {
            console.log(data);
        }
</script>

<body class="flex w-100 h-100 bg-white flex items-center justify-center">
    <div id="login" class="db shadow-3 br3 pa3 bg-white w-30">
        <h2 class="ma0 mb1 f4">LOGIN</h2>
        <h5 class="ma0 mb3 gray fw1">MQTT CONTROLLER</h5>
        <form action="#" class="flex flex-column" onsubmit="login(); return false">
          <button type="submit" class="mt3 pv2 br3 bg-green white bold outline-0 ba b--green">
            Login
          </button>
        </form>
      </div>
</body>
</html>
